<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AI 翻译</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- 头部 -->
  <div class="header">
    <div class="header-left">
      <span class="logo">🌐</span>
      <span class="title">AI 智能翻译</span>
    </div>
    <button id="settingsBtn" class="icon-btn" title="设置">⚙</button>
  </div>

  <!-- 主体 -->
  <div class="main">

    <!-- 语言切换栏 -->
    <div class="lang-bar">
      <select id="sourceLang" class="lang-sel">
        <option value="auto">自动检测</option>
        <option value="zh">中文</option>
        <option value="en">英语</option>
        <option value="ja">日语</option>
        <option value="ko">韩语</option>
        <option value="fr">法语</option>
        <option value="de">德语</option>
        <option value="es">西班牙语</option>
        <option value="ru">俄语</option>
        <option value="pt">葡萄牙语</option>
        <option value="ar">阿拉伯语</option>
      </select>
      <button id="swapBtn" class="swap-btn" title="交换语言">⇄</button>
      <select id="targetLang" class="lang-sel">
        <option value="zh">中文</option>
        <option value="en">英语</option>
        <option value="ja">日语</option>
        <option value="ko">韩语</option>
        <option value="fr">法语</option>
        <option value="de">德语</option>
        <option value="es">西班牙语</option>
        <option value="ru">俄语</option>
        <option value="pt">葡萄牙语</option>
        <option value="ar">阿拉伯语</option>
      </select>
    </div>

    <!-- 输入区 -->
    <div class="input-wrap">
      <textarea id="inputText" class="textarea" placeholder="输入要翻译的文字…" maxlength="5000"></textarea>
      <div class="input-meta">
        <span class="char-count"><span id="charCount">0</span> / 5000</span>
        <button id="clearBtn" class="clear-btn" title="清空">✕</button>
      </div>
    </div>

    <!-- 翻译按钮 -->
    <button id="translateBtn" class="translate-btn">
      <span id="btnText">翻译</span>
      <span id="btnLoading" style="display:none">翻译中…</span>
    </button>

    <!-- 输出区 -->
    <div class="output-card" id="outputCard">
      <div class="output-header">
        <span class="output-label">翻译结果</span>
        <div class="output-actions">
          <button id="copyBtn" class="icon-btn" title="复制">📋</button>
          <button id="speakBtn" class="icon-btn" title="朗读">🔊</button>
        </div>
      </div>
      <div id="outputText" class="output-text">
        <span class="placeholder">翻译结果将显示在这里</span>
      </div>
    </div>

    <!-- 设置面板 -->
    <div id="settingsPanel" class="settings-card" style="display:none">
      <div class="setting-row">
        <label class="setting-label">翻译引擎</label>
        <select id="engineSelect" class="setting-sel">
          <option value="mymemory">MyMemory（免费，推荐）</option>
          <option value="google">Google 翻译（免费）</option>
          <option value="lingva">Lingva（开源免费）</option>
        </select>
      </div>

      <div class="setting-row" id="emailRow">
        <label class="setting-label">MyMemory 邮箱 <small>（可选，提升配额）</small></label>
        <input id="emailInput" type="email" class="setting-input" placeholder="your@email.com">
      </div>

      <div class="setting-row">
        <label class="toggle-label">
          <input type="checkbox" id="showBubbleCheck">
          <span>显示划词翻译气泡</span>
        </label>
      </div>

      <div class="setting-row">
        <label class="toggle-label">
          <input type="checkbox" id="autoTranslateCheck">
          <span>输入时自动翻译</span>
        </label>
      </div>

      <button id="saveBtn" class="save-btn">保存</button>
    </div>

  </div>

  <!-- 底部提示 -->
  <div class="footer">💡 选中网页文字后自动弹出翻译</div>

  <script src="popup.js"></script>
</body>
</html>
